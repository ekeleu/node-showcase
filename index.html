<!DOCTYPE html>
<html>
<head>
    <title>ekeleu Node Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; text-align: center; padding: 40px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; display: inline-block; margin: 10px; width: 200px; }
        .val { font-size: 1.8em; color: #58a6ff; font-weight: bold; display: block; margin-top: 10px; }
        .label { font-size: 0.75em; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        h1 { color: #f2a900; margin-bottom: 5px; }
        .meta { color: #8b949e; margin-bottom: 30px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BLOCKCHAIN WAREHOUSE</h1>
        <div class="meta">System Heartbeat: 2026-03-05 19:00:01 GMT</div>
        <div class="card"><span class="label">Bitcoin Block</span><span class="val"></span></div>
        <div class="card"><span class="label">Sync Progress</span><span class="val">%</span></div>
        <div class="card"><span class="label">P2P Peers</span><span class="val"></span></div>
        <div class="card"><span class="label">CPU Temperature</span><span class="val">65.0°C</span></div>
        <div class="card"><span class="label">Fan Speed</span><span class="val">2009</span></div>
        <div class="card"><span class="label">Tor Status</span><span class="val">Inactive</span></div>
    </div>
</body>
</html>
